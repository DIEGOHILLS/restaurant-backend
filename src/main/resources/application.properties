spring.application.name=restaurant

# ✅ Render gives PORT automatically → MUST bind to it
server.port=${PORT:8080}

# ========================
# 🔍 ELASTICSEARCH (Bonsai)
# ========================
# Use full URI (with https)
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS}

# ⚠️ REMOVE username/password (Bonsai already includes it in URL)
# spring.elasticsearch.username=
# spring.elasticsearch.password=

spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=60s

# IMPORTANT → allow index creation (you disabled it before)
spring.data.elasticsearch.auto-index-creation=true

# compatibility mode for older ES clusters
spring.elasticsearch.rest.compatibility-mode=true


# ========================
# 🔐 SECURITY (KEYCLOAK)
# ========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}


# ========================
# 🐘 POSTGRES (NEON)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ========================
# 🔥 DEBUG (TEMP - REMOVE LATER)
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.elasticsearch=DEBUG
